name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node18-win-x64
            artifact_name: antigravity-restores-conversation-win.exe
            asset_name: antigravity-restores-conversation-win.exe
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact_name: antigravity-restores-conversation-linux
            asset_name: antigravity-restores-conversation-linux
          - os: macos-latest
            target: node18-macos-x64
            artifact_name: antigravity-restores-conversation-macos
            asset_name: antigravity-restores-conversation-macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v18 to sync with pkg targets)
        uses: actions/setup-node@v4
        with:
          node-version: '18.15.0'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build JS Source
        run: npm run build

      - name: Package Executable with pkg
        run: npx pkg . --targets ${{ matrix.target }} --output bin/${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/${{ matrix.artifact_name }}
