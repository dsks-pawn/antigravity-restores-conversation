name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: antigravity-restores-conversation-win.exe
          - os: ubuntu-latest
            artifact_name: antigravity-restores-conversation-linux
          - os: macos-latest
            artifact_name: antigravity-restores-conversation-macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build JS Source
        run: npm run build

      - name: Generate Executable via Node SEA
        run: npm run build:exe

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/${{ matrix.artifact_name }}
          generate_release_notes: true
